# Application Configuration for Docker
spring.application.name=gym-management

# Server Configuration
server.port=8080

# Database Configuration - PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://postgres:5432/gym_management
spring.datasource.username=gymuser
spring.datasource.password=gympass123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=gym-backend-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Elasticsearch Configuration
elasticsearch.url=http://elasticsearch:9200

# Debezium Connect Endpoint
debezium.connect.url=http://debezium-connect:8083

# Logging
logging.level.com.gym.management=INFO
logging.level.org.hibernate.SQL=DEBUG

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
