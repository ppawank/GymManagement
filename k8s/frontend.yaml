apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gym-management
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: gym-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-frontend
  namespace: gym-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gym-frontend
  template:
    metadata:
      labels:
        app: gym-frontend
    spec:
      containers:
        - name: frontend
          image: gym-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
