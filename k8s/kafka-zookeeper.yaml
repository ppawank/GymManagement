apiVersion: v1
kind: Service
metadata:
  name: gym-zookeeper
  namespace: gym-management
spec:
  ports:
    - port: 2181
      targetPort: 2181
  selector:
    app: gym-zookeeper
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gym-zookeeper
  namespace: gym-management
spec:
  serviceName: gym-zookeeper
  replicas: 1
  selector:
    matchLabels:
      app: gym-zookeeper
  template:
    metadata:
      labels:
        app: gym-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.3.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
              name: client
---
apiVersion: v1
kind: Service
metadata:
  name: gym-kafka
  namespace: gym-management
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: gym-kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gym-kafka
  namespace: gym-management
spec:
  serviceName: gym-kafka
  replicas: 1
  selector:
    matchLabels:
      app: gym-kafka
  template:
    metadata:
      labels:
        app: gym-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.3.0
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "gym-zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://gym-kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 9092
              name: broker
